name: Weekly Audit

on:
  schedule:
    - cron: '0 18 * * 0' # Dimanche 20h Paris (18h UTC)
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          cd api && npm ci --ignore-scripts

      - name: Generate report
        id: audit
        run: |
          # Write report to a file to avoid %0A formatting issues
          REPORT_FILE=$(mktemp)

          echo "📊 *Rapport Hebdo DigitaliX*" >> "$REPORT_FILE"
          echo "$(date +'%d/%m/%Y')" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          # --- Health Check API ---
          HEALTH=$(curl -s --max-time 10 https://api.digitalix.xyz/api/health 2>/dev/null || echo '{"status":"unreachable"}')
          HEALTH_STATUS=$(echo "$HEALTH" | jq -r '.status // "unreachable"')
          if [ "$HEALTH_STATUS" = "ok" ]; then
            echo "✅ API opérationnelle" >> "$REPORT_FILE"
          else
            echo "🔴 API : $HEALTH_STATUS" >> "$REPORT_FILE"
          fi
          echo "" >> "$REPORT_FILE"

          # --- Deps critiques (production only) ---
          # Backend prod deps
          PROD_CRITICAL=""
          cd api
          BACKEND_JSON=$(npm outdated --json 2>/dev/null || echo '{}')

          # Filter: only production deps with major updates (exclude @types/*)
          BACKEND_PROD_MAJOR=$(echo "$BACKEND_JSON" | jq -r '
            to_entries[]
            | select(.key | startswith("@types/") | not)
            | select(.value.type == "dependencies" or .value.type == null)
            | select((.value.current | split(".")[0]) != (.value.latest | split(".")[0]))
            | "• \(.key): \(.value.current) → \(.value.latest)"
          ' 2>/dev/null)
          BACKEND_TOTAL=$(echo "$BACKEND_JSON" | jq 'length')
          cd ..

          # Frontend prod deps
          FRONTEND_JSON=$(npm outdated --json 2>/dev/null || echo '{}')
          FRONTEND_PROD_MAJOR=$(echo "$FRONTEND_JSON" | jq -r '
            to_entries[]
            | select(.key | startswith("@types/") | not)
            | select(.key | test("^(eslint|@eslint|prettier|jsdom|globals|@vitejs)") | not)
            | select((.value.current | split(".")[0]) != (.value.latest | split(".")[0]))
            | "• \(.key): \(.value.current) → \(.value.latest)"
          ' 2>/dev/null)
          FRONTEND_TOTAL=$(echo "$FRONTEND_JSON" | jq 'length')

          # Count dev-only major updates (filtered out above)
          FRONTEND_DEV_MAJOR=$(echo "$FRONTEND_JSON" | jq '[
            to_entries[]
            | select(
                (.key | startswith("@types/"))
                or (.key | test("^(eslint|@eslint|prettier|jsdom|globals|@vitejs)"))
              )
            | select((.value.current | split(".")[0]) != (.value.latest | split(".")[0]))
          ] | length')

          # --- Build the deps section ---
          HAS_IMPORTANT=false

          if [ -n "$BACKEND_PROD_MAJOR" ]; then
            echo "🔶 *Backend — updates importantes*" >> "$REPORT_FILE"
            echo "$BACKEND_PROD_MAJOR" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            HAS_IMPORTANT=true
          fi

          if [ -n "$FRONTEND_PROD_MAJOR" ]; then
            echo "🔶 *Frontend — updates importantes*" >> "$REPORT_FILE"
            echo "$FRONTEND_PROD_MAJOR" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            HAS_IMPORTANT=true
          fi

          if [ "$HAS_IMPORTANT" = false ]; then
            echo "✅ Aucune update critique" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
          fi

          # Summary line
          echo "📦 _${BACKEND_TOTAL} backend + ${FRONTEND_TOTAL} frontend outdated au total_" >> "$REPORT_FILE"
          if [ "$FRONTEND_DEV_MAJOR" != "0" ]; then
            echo "_(dont ${FRONTEND_DEV_MAJOR} devDeps majeures, non urgentes)_" >> "$REPORT_FILE"
          fi
          echo "" >> "$REPORT_FILE"

          # --- GitHub Issues ---
          ISSUES_COUNT=$(gh issue list --json number --jq 'length' 2>/dev/null || echo '0')
          echo "📋 Issues GitHub : ${ISSUES_COUNT}" >> "$REPORT_FILE"

          # Save report path for next step
          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Send to Telegram
        run: |
          REPORT=$(cat "${{ steps.audit.outputs.report_file }}")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=$REPORT"
