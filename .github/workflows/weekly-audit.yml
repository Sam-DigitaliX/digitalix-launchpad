name: Weekly Audit

on:
  schedule:
    - cron: '0 18 * * 0' # Dimanche 20h Paris (18h UTC)
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          cd api && npm ci --ignore-scripts

      - name: Generate report
        id: audit
        run: |
          REPORT_FILE=$(mktemp)

          echo "📊 *Rapport Hebdo DigitaliX*" >> "$REPORT_FILE"
          echo "$(date +'%d/%m/%Y')" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          # --- Health Check API ---
          HEALTH=$(curl -s --max-time 10 https://api.digitalix.xyz/api/health 2>/dev/null || echo '{"status":"unreachable"}')
          HEALTH_STATUS=$(echo "$HEALTH" | jq -r '.status // "unreachable"')
          if [ "$HEALTH_STATUS" = "ok" ]; then
            echo "✅ API opérationnelle" >> "$REPORT_FILE"
          else
            echo "🔴 API down — vérifier Coolify" >> "$REPORT_FILE"
          fi

          # --- Infra: Coolify + Traefik + VPS ---
          echo "" >> "$REPORT_FILE"
          echo "🖥 *Infrastructure*" >> "$REPORT_FILE"

          COOLIFY_CURRENT=$(curl -s --max-time 5 -H "Authorization: Bearer $COOLIFY_API_TOKEN" http://148.230.108.196:8000/api/v1/version 2>/dev/null | tr -d '\n' || echo "?")
          VERSIONS_JSON=$(curl -s --max-time 5 https://cdn.coollabs.io/coolify/versions.json 2>/dev/null)
          COOLIFY_LATEST=$(echo "$VERSIONS_JSON" | jq -r '.coolify.v4.version // "?"' | tr -d '\n')
          TRAEFIK_LATEST=$(echo "$VERSIONS_JSON" | jq -r '.traefik."v3.6" // "?"' | tr -d '\n')

          SERVER_JSON=$(curl -s --max-time 5 -H "Authorization: Bearer $COOLIFY_API_TOKEN" http://148.230.108.196:8000/api/v1/servers 2>/dev/null)
          TRAEFIK_CURRENT=$(echo "$SERVER_JSON" | jq -r '.[0].settings.detected_traefik_version // .[0].detected_traefik_version // "?"' | tr -d '\n')

          if [ "$COOLIFY_CURRENT" = "$COOLIFY_LATEST" ]; then
            echo "✅ Coolify $COOLIFY_CURRENT" >> "$REPORT_FILE"
          else
            echo "🔶 Coolify $COOLIFY_CURRENT → $COOLIFY_LATEST" >> "$REPORT_FILE"
            echo "  _→ UI Coolify > Settings > Update_" >> "$REPORT_FILE"
          fi

          if [ "$TRAEFIK_CURRENT" = "?" ] || [ -z "$TRAEFIK_CURRENT" ]; then
            echo "✅ Traefik OK" >> "$REPORT_FILE"
          elif [ "$TRAEFIK_CURRENT" = "$TRAEFIK_LATEST" ]; then
            echo "✅ Traefik $TRAEFIK_CURRENT" >> "$REPORT_FILE"
          else
            echo "🔶 Traefik $TRAEFIK_CURRENT → $TRAEFIK_LATEST" >> "$REPORT_FILE"
            echo "  _→ Se met à jour avec Coolify_" >> "$REPORT_FILE"
          fi

          VPS_INFO=$(curl -s --max-time 5 -H "Authorization: Bearer $HOSTINGER_API_TOKEN" "https://developers.hostinger.com/api/vps/v1/virtual-machines" 2>/dev/null)
          VPS_STATE=$(echo "$VPS_INFO" | jq -r '.[0].state // "?"' | tr -d '\n')
          if [ "$VPS_STATE" = "running" ]; then
            echo "✅ VPS running" >> "$REPORT_FILE"
          else
            echo "🔴 VPS $VPS_STATE — vérifier Hostinger" >> "$REPORT_FILE"
          fi

          # --- Deps: key packages only ---
          echo "" >> "$REPORT_FILE"
          echo "📦 *Dépendances*" >> "$REPORT_FILE"

          KEY_PACKAGES="react react-dom react-router-dom vite tailwindcss typescript hono playwright"

          cd api
          BACKEND_JSON=$(npm outdated --json 2>/dev/null || echo '{}')
          BACKEND_TOTAL=$(echo "$BACKEND_JSON" | jq 'length' | tr -d '\n')
          cd ..
          FRONTEND_JSON=$(npm outdated --json 2>/dev/null || echo '{}')
          FRONTEND_TOTAL=$(echo "$FRONTEND_JSON" | jq 'length' | tr -d '\n')

          HAS_KEY_UPDATE=false
          for pkg in $KEY_PACKAGES; do
            CURRENT=$(echo "$FRONTEND_JSON" | jq -r --arg p "$pkg" '.[$p].current // empty' | tr -d '\n')
            LATEST=$(echo "$FRONTEND_JSON" | jq -r --arg p "$pkg" '.[$p].latest // empty' | tr -d '\n')
            if [ -z "$CURRENT" ]; then
              CURRENT=$(echo "$BACKEND_JSON" | jq -r --arg p "$pkg" '.[$p].current // empty' | tr -d '\n')
              LATEST=$(echo "$BACKEND_JSON" | jq -r --arg p "$pkg" '.[$p].latest // empty' | tr -d '\n')
            fi
            if [ -n "$CURRENT" ] && [ -n "$LATEST" ] && [ "$CURRENT" != "$LATEST" ]; then
              CURRENT_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
              LATEST_MAJOR=$(echo "$LATEST" | cut -d. -f1)
              if [ "$CURRENT_MAJOR" != "$LATEST_MAJOR" ]; then
                echo "🔶 $pkg : $CURRENT → $LATEST" >> "$REPORT_FILE"
                HAS_KEY_UPDATE=true
              fi
            fi
          done

          if [ "$HAS_KEY_UPDATE" = true ]; then
            echo "  _→ Créer une branche, npm install, tester avant merge_" >> "$REPORT_FILE"
          else
            echo "✅ Packages clés à jour" >> "$REPORT_FILE"
          fi

          echo "_${BACKEND_TOTAL} backend + ${FRONTEND_TOTAL} frontend outdated au total_" >> "$REPORT_FILE"
          echo "_→ Pour tout mettre à jour : npm update (mineures/patchs seulement)_" >> "$REPORT_FILE"

          # --- GitHub Issues ---
          echo "" >> "$REPORT_FILE"
          ISSUES_COUNT=$(gh issue list --json number --jq 'length' 2>/dev/null | tr -d '\n' || echo '0')
          echo "📋 Issues : ${ISSUES_COUNT}" >> "$REPORT_FILE"

          # --- Verdict ---
          echo "" >> "$REPORT_FILE"
          ACTION_COUNT=$(grep -c "🔶\|🔴" "$REPORT_FILE" || true)
          HAS_CRITICAL=$(grep -c "🔴" "$REPORT_FILE" || true)

          if [ "$HAS_CRITICAL" -gt 0 ]; then
            echo "⚡ *ACTION REQUISE*" >> "$REPORT_FILE"
            echo "_Un service est down. Vérifier immédiatement._" >> "$REPORT_FILE"
          elif [ "$ACTION_COUNT" -gt 0 ]; then
            echo "💡 *PAS URGENT*" >> "$REPORT_FILE"
            echo "_${ACTION_COUNT} updates dispos. Rien ne casse, à planifier quand tu as un créneau._" >> "$REPORT_FILE"
          else
            echo "✅ *TOUT EST OK*" >> "$REPORT_FILE"
            echo "_Rien à faire. Bonne semaine !_" >> "$REPORT_FILE"
          fi

          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}

      - name: Send to Telegram
        run: |
          REPORT=$(cat "${{ steps.audit.outputs.report_file }}")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=$REPORT"
